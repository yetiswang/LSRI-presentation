<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440" />
<title>Global SDL Landscape · Map</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3.1.0/dist/topojson-client.min.js"></script>

<style>
:root{
  --bg:         oklch(0.18 0.01 240);
  --bg-2:       oklch(0.22 0.01 240);
  --bg-3:       oklch(0.26 0.01 240);
  --ink:        oklch(0.94 0.01 85);
  --ink-2:      oklch(0.78 0.01 85);
  --ink-3:      oklch(0.58 0.01 85);
  --ink-4:      oklch(0.42 0.01 240);
  --rule:       oklch(0.32 0.01 240);
  --rule-2:     oklch(0.28 0.01 240);
  --land:       oklch(0.24 0.01 240);
  --land-edge:  oklch(0.32 0.01 240);
  --graticule:  oklch(0.26 0.01 240);

  --c-national:   oklch(0.78 0.14 85);
  --c-academic:   oklch(0.78 0.14 200);
  --c-commercial: oklch(0.72 0.18 25);
  --c-labos:      oklch(0.78 0.14 300);

  --font-sans: 'Inter', system-ui, sans-serif;
  --font-mono: 'IBM Plex Mono', ui-monospace, monospace;
}

*{ box-sizing:border-box; }
html, body{ margin:0; padding:0; background:var(--bg); color:var(--ink); font-family:var(--font-sans); }
body{ min-height:100vh; -webkit-font-smoothing:antialiased; }

#app{
  display:grid;
  grid-template-columns: 300px 1fr 320px;
  grid-template-rows: auto 1fr auto;
  grid-template-areas:
    "header header header"
    "left   map    right"
    "footer footer footer";
  gap:0;
  min-height:100vh;
}

/* Header */
header.top{
  grid-area:header;
  display:flex; align-items:flex-end; justify-content:space-between;
  padding:22px 28px 18px;
  border-bottom:1px solid var(--rule);
  gap:40px;
}
.brand .eyebrow{
  font-family:var(--font-mono); font-size:11px; color:var(--ink-3);
  letter-spacing:0.22em; text-transform:uppercase; margin-bottom:6px;
}
.brand h1{
  font-family:var(--font-sans); font-weight:600; font-size:28px; letter-spacing:-0.01em;
  margin:0; color:var(--ink);
}
.brand h1 .dim{ color:var(--ink-3); font-weight:400; }

.counts{
  display:flex; gap:28px; font-family:var(--font-mono); font-size:11px; color:var(--ink-3);
  letter-spacing:0.1em;
}
.counts .n{ color:var(--ink); font-size:22px; font-weight:500; letter-spacing:0; display:block; font-variant-numeric:tabular-nums; }
.counts .lbl{ text-transform:uppercase; }

/* Sidebars */
aside{
  padding:24px 22px 24px;
  border-right:1px solid var(--rule);
  overflow-y:auto;
  max-height:calc(100vh - 150px);
}
aside.right{ border-right:0; border-left:1px solid var(--rule); grid-area:right; }
aside.left{ grid-area:left; }

.section-h{
  font-family:var(--font-mono); font-size:10px; color:var(--ink-3);
  letter-spacing:0.22em; text-transform:uppercase;
  margin:22px 0 10px; padding-bottom:6px; border-bottom:1px solid var(--rule-2);
}
.section-h:first-child{ margin-top:0; }

/* Filter chips */
.chips{ display:flex; flex-direction:column; gap:4px; }
.chip{
  display:flex; align-items:center; gap:10px;
  padding:7px 10px; border-radius:3px;
  background:transparent; border:1px solid transparent;
  cursor:pointer; font-family:var(--font-sans); font-size:13px; color:var(--ink-2);
  text-align:left; width:100%;
  transition: background .12s, color .12s, border-color .12s;
}
.chip:hover{ background:var(--bg-2); color:var(--ink); }
.chip.active{
  background:var(--bg-2); border-color:var(--rule); color:var(--ink);
}
.chip .dot{
  width:8px; height:8px; border-radius:50%; background:var(--ink-4); flex:0 0 auto;
  box-shadow: 0 0 0 1px rgba(0,0,0,0.3) inset;
}
.chip.active .dot{ box-shadow: 0 0 0 2px var(--bg), 0 0 0 3px currentColor; }
.chip .n{
  margin-left:auto; font-family:var(--font-mono); font-size:11px; color:var(--ink-3);
  font-variant-numeric:tabular-nums;
}
.chip.dim{ opacity:0.5; }

.chip[data-tier="national"]   .dot{ background:var(--c-national); }
.chip[data-tier="academic"]   .dot{ background:var(--c-academic); }
.chip[data-tier="commercial"] .dot{ background:var(--c-commercial); }
.chip[data-tier="labos"]      .dot{ background:var(--c-labos); }

.legend-row{
  display:flex; align-items:center; gap:10px; padding:5px 0;
  font-size:12px; color:var(--ink-2);
}
.legend-row .sw{ width:12px; height:12px; border-radius:50%; }

/* Reset button */
.reset-btn{
  width:100%; margin-top:8px;
  padding:8px 10px; background:transparent;
  border:1px solid var(--rule); color:var(--ink-2);
  font-family:var(--font-mono); font-size:11px; letter-spacing:0.1em; text-transform:uppercase;
  cursor:pointer; border-radius:2px;
}
.reset-btn:hover{ background:var(--bg-2); color:var(--ink); }

/* Map */
.map-wrap{
  grid-area:map;
  position:relative;
  overflow:hidden;
  background:
    radial-gradient(ellipse 80% 70% at 50% 45%, oklch(0.22 0.01 240) 0%, var(--bg) 80%);
}
#map{ width:100%; height:100%; display:block; touch-action:none; user-select:none; }
.map-wrap svg{ width:100%; height:100%; display:block; }

.graticule{ fill:none; stroke:var(--graticule); stroke-width:0.5; opacity:0.5; vector-effect:non-scaling-stroke; }
.sphere{ fill:none; stroke:var(--rule); stroke-width:1; vector-effect:non-scaling-stroke; }
.sphere-fill{ pointer-events:none; }
.atmosphere{ pointer-events:none; }
.specular{ pointer-events:none; }
.land{ fill:var(--land); stroke:none; vector-effect:non-scaling-stroke; transition: opacity .3s; }
.filtering .land{ opacity:0.5; }
.filtering .graticule{ opacity:0.2; }
.borders{ fill:none; stroke:oklch(0.32 0.01 240); stroke-width:0.5; opacity:0.9; vector-effect:non-scaling-stroke; stroke-linejoin:round; }
.borders-outer{ fill:none; stroke:oklch(0.40 0.01 240); stroke-width:0.7; vector-effect:non-scaling-stroke; stroke-linejoin:round; }
.provinces{
  fill:none; stroke:oklch(0.30 0.01 240); stroke-width:0.4;
  vector-effect:non-scaling-stroke; stroke-linejoin:round;
  stroke-dasharray: 2 2;
  opacity:0; transition: opacity .35s;
  pointer-events:none;
}
.country-label{
  font-family:var(--font-mono); font-weight:500;
  font-size:8px; fill:var(--ink-3); opacity:0;
  letter-spacing:0.18em; pointer-events:none;
  transition: opacity .35s;
  paint-order: stroke fill;
  stroke: var(--bg); stroke-width: 2.5px; stroke-linejoin:round;
}
.country-label[data-tier="1"]{ font-size:8.5px; fill:var(--ink-2); letter-spacing:0.2em; }
.country-label[data-tier="2"]{ font-size:7.5px; fill:var(--ink-3); }
.country-label[data-tier="3"]{ font-size:7px; fill:var(--ink-3); opacity:0.7; }

.province-label{
  font-family:var(--font-mono); font-weight:400;
  font-size:8px; fill:var(--ink-3); opacity:0;
  letter-spacing:0.06em; pointer-events:none;
  transition: opacity .35s;
  paint-order: stroke fill;
  stroke: var(--bg); stroke-width: 2.5px; stroke-linejoin:round;
}

/* Markers */
.marker{ cursor:pointer; transition: opacity .2s; }
.marker .ring{ fill:none; stroke:currentColor; stroke-width:1; opacity:0.4; }
.marker .core{ fill:currentColor; }
.marker.dim{ opacity:0.08; pointer-events:none; }
.marker.dim .ring{ opacity:0; }
.marker.dim .core{ r:2; }

.marker.hl{
  filter: drop-shadow(0 0 6px currentColor) drop-shadow(0 0 12px currentColor);
}
.marker.hl .core{ filter: brightness(1.4); }
.marker.hl .ring{ opacity:0.8; stroke-width:1.5; }
.marker.hl .pulse{
  fill:none; stroke:currentColor; stroke-width:1.5;
  animation: pulse 1.8s ease-out infinite;
  transform-origin: center;
}
@keyframes pulse{
  0%   { r: 6;  opacity:0.8; stroke-width:2; }
  100% { r: 28; opacity:0;   stroke-width:0.5; }
}

.marker-label{
  font-family:var(--font-mono); font-size:9.5px; fill:var(--ink-2);
  pointer-events:none; letter-spacing:0.02em;
  text-shadow: 0 0 4px var(--bg), 0 0 4px var(--bg);
}

/* Tooltip */
.tip{
  position:absolute; pointer-events:none;
  background:oklch(0.14 0.01 240 / 0.96);
  border:1px solid var(--rule);
  border-radius:3px;
  padding:12px 14px;
  min-width:260px; max-width:320px;
  color:var(--ink);
  backdrop-filter:blur(6px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.6);
  opacity:0; transition: opacity .14s;
  z-index:20;
  font-size:12px;
}
.tip.show{ opacity:1; }
.tip .t-head{ display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.tip .t-dot{ width:10px; height:10px; border-radius:50%; }
.tip .t-name{ font-weight:600; font-size:14px; line-height:1.2; }
.tip .t-meta{ font-family:var(--font-mono); font-size:10.5px; color:var(--ink-3); letter-spacing:0.08em; text-transform:uppercase; margin-bottom:8px; }
.tip .t-row{ display:flex; justify-content:space-between; gap:14px; padding:3px 0; color:var(--ink-2); }
.tip .t-row .k{ color:var(--ink-3); font-family:var(--font-mono); font-size:10.5px; letter-spacing:0.06em; text-transform:uppercase; }
.tip .t-row .v{ text-align:right; }

/* Right rail: active highlight list */
.list{ display:flex; flex-direction:column; gap:0; }
.list-item{
  padding:10px 4px; border-bottom:1px solid var(--rule-2);
  display:grid; grid-template-columns: 14px 1fr auto; gap:10px; align-items:start;
  cursor:pointer;
}
.list-item:hover{ background:var(--bg-2); }
.list-item .ldot{ width:8px; height:8px; border-radius:50%; margin-top:6px; }
.list-item .lname{ font-size:13px; color:var(--ink); font-weight:500; line-height:1.25; }
.list-item .lmeta{ font-family:var(--font-mono); font-size:10.5px; color:var(--ink-3); letter-spacing:0.04em; margin-top:2px; }
.list-item .lcountry{ font-family:var(--font-mono); font-size:10.5px; color:var(--ink-2); letter-spacing:0.04em; }

/* Footer */
footer.bot{
  grid-area:footer;
  padding:12px 28px;
  border-top:1px solid var(--rule);
  display:flex; justify-content:space-between; align-items:center;
  font-family:var(--font-mono); font-size:10.5px; color:var(--ink-3);
  letter-spacing:0.12em; text-transform:uppercase;
}
footer .leg{ display:flex; gap:20px; align-items:center; }
footer .leg .item{ display:flex; gap:6px; align-items:center; }
footer .leg .circ{ border:1px solid var(--ink-3); border-radius:50%; }

.empty{
  font-family:var(--font-mono); font-size:11px; color:var(--ink-3);
  padding:16px 4px; text-align:center; border:1px dashed var(--rule-2); border-radius:3px;
}

/* Zoom controls */
.zoom-ctl{
  position:absolute; top:16px; right:16px; z-index:10;
  display:flex; flex-direction:column; gap:4px;
  background:oklch(0.14 0.01 240 / 0.9);
  border:1px solid var(--rule); border-radius:4px;
  padding:4px;
  backdrop-filter:blur(4px);
}
.zoom-ctl button{
  width:32px; height:32px; padding:0;
  background:transparent; border:0;
  color:var(--ink-2); cursor:pointer;
  font-family:var(--font-mono); font-size:18px; line-height:1;
  border-radius:2px;
  display:flex; align-items:center; justify-content:center;
  transition:background .12s, color .12s;
}
.zoom-ctl button:hover{ background:var(--bg-3); color:var(--ink); }
.zoom-ctl button:active{ background:var(--bg-2); }
.zoom-ctl button + button{ border-top:1px solid var(--rule-2); }
.zoom-ctl #z-reset{ font-size:15px; }

/* Region navigation buttons — overlaid on the map, below zoom controls */
.region-nav{
  position:absolute; top:140px; right:16px; z-index:20;
  display:flex; flex-direction:column; gap:4px;
}
.region-nav button{
  padding:6px 10px;
  background:oklch(0.14 0.01 240 / 0.9);
  border:1px solid var(--rule);
  color:var(--ink-2); cursor:pointer;
  font-family:var(--font-mono); font-size:11px; font-weight:600;
  letter-spacing:0.08em; text-transform:uppercase;
  border-radius:3px;
  backdrop-filter:blur(4px);
  transition:background .15s, color .15s, border-color .15s;
}
.region-nav button:hover{ background:var(--bg-3); color:var(--ink); border-color:var(--ink-3); }
.region-nav button.active-region{ border-color:var(--accent); color:var(--accent); }

/* Filter callout — contextual annotation on the map */
.filter-callout{
  position:absolute; left:50%; transform:translateX(-50%);
  font-family:var(--font-mono); font-size:11px; color:var(--ink-2);
  letter-spacing:0.04em; line-height:1.5;
  padding:8px 16px; border:1px solid var(--accent); border-radius:3px;
  background:oklch(0.14 0.01 240 / 0.88); backdrop-filter:blur(6px);
  max-width:520px; text-align:center;
  pointer-events:none; z-index:25;
  opacity:0; transition:opacity .4s;
}
.filter-callout.visible{ opacity:1; }
.filter-callout strong{ color:var(--accent); }

.zoom-hint{
  position:absolute; bottom:16px; left:50%; transform:translateX(-50%);
  font-family:var(--font-mono); font-size:10.5px; color:var(--ink-3);
  letter-spacing:0.14em; text-transform:uppercase;
  padding:6px 14px; border:1px solid var(--rule-2); border-radius:2px;
  background:oklch(0.14 0.01 240 / 0.7); backdrop-filter:blur(4px);
  pointer-events:none; transition:opacity .5s;
}
.zoom-hint.fade{ opacity:0; }
</style>
</head>

  const [world, china] = await Promise.all([
    fetch(worldUrl).then(r => r.json()),
    fetch(chinaUrl).then(r => r.json()).catch(()=>null),
  ]);
  const landFeat = topojson.feature(world, world.objects.land);
  const countriesFeat = topojson.feature(world, world.objects.countries);
  const countriesMesh = topojson.mesh(world, world.objects.countries, (a,b) => a !== b);
  const countriesOuter = topojson.mesh(world, world.objects.countries, (a,b) => a === b);

    for(const k of Object.keys(state.filters)){
      const s = state.filters[k];
      if(s.size === 0) continue;
      if(!s.has(d[k])) return false;
    }
    return true;
  }
  function anyFilterActive(){
    return Object.values(state.filters).some(s => s.size>0);

  // Render / filter application

  // Globe rotate + zoom
  const view = {
    scale: BASE_SCALE * 5.5,
    rotate: [-5, -50, 0],
    min: BASE_SCALE,
    max: BASE_SCALE * 12,
  };
  const zHint = document.getElementById('z-hint');

  function gcDist(a, b){
    const [la1, ph1] = a.map(d => d*Math.PI/180);
    const [la2, ph2] = b.map(d => d*Math.PI/180);
    const dl = la2 - la1;
    const cos = Math.sin(ph1)*Math.sin(ph2) + Math.cos(ph1)*Math.cos(ph2)*Math.cos(dl);
    return Math.acos(Math.max(-1,Math.min(1,cos))) * 180/Math.PI;
  }

  function redraw(){
    projection.scale(view.scale).rotate(view.rotate);
    const k = view.scale / BASE_SCALE;

    const r = view.scale;
    sphereFill.setAttribute('r', r);
    sphereFill.setAttribute('fill', 'url(#globeFill)');
    spec.setAttribute('r', r);
    spec.setAttribute('fill', 'url(#globeHilite)');
    atmos.setAttribute('r', r + 18);
    atmos.setAttribute('fill', 'oklch(0.55 0.10 240 / 0.18)');
    atmos.setAttribute('filter', 'url(#atmosphere)');
    sphereLine.setAttribute('d', path({type:'Sphere'}));

    gratPath.setAttribute('d', path(gratGen()));
    landPath.setAttribute('d', path(landFeat));
    bordersPath.setAttribute('d', path(countriesMesh));
    outerPath.setAttribute('d', path(countriesOuter));
    if(chinaProvPath && china){
      chinaProvPath.setAttribute('d', path({type:'FeatureCollection', features: china.features}));
      chinaProvPath.style.opacity = (k >= 2.2) ? '1' : '0';
    }

    const center = [-view.rotate[0], -view.rotate[1]];

    DATA.forEach(d => {
      const p = projection([d.lon, d.lat]);
      const dist = gcDist(center, [d.lon, d.lat]);
      const visible = dist < 88 && p;
      if(visible){
        const x = p[0] + d._off[0];
        const y = p[1] + d._off[1];
        d._el.style.display = '';
        d._el.setAttribute('transform', 'translate('+x+','+y+')');
        const limbFade = Math.min(1, Math.max(0, (88 - dist)/20));
        // Respect dim/hl class — dim markers get much lower opacity
        const isDim = d._el.classList.contains('dim');
        d._el.style.opacity = isDim ? limbFade * 0.08 : limbFade;
        d._x = x; d._y = y;
        d._el.querySelector('.m-inner').removeAttribute('transform');
      } else {
        d._el.style.display = 'none';
      }
    });

    gLabels.querySelectorAll('.country-label, .province-label').forEach(el => el.style.display = 'none');
    countryLabels.forEach(l => {
      const dist = gcDist(center, l.coord);
      if(dist >= 78){ return; }
      const tier = l._el.dataset.tier;
      const show = (tier === '1' && k >= 1.0) ||
                   (tier === '2' && k >= 1.8) ||
                   (tier === '3' && k >= 3.0);
      if(!show) return;
      const p = projection(l.coord);
      if(!p) return;
      l._el.style.display = '';
      l._el.setAttribute('x', p[0]);
      l._el.setAttribute('y', p[1]);
      l._el.style.opacity = '1';
    });
    if(k >= 3.5){
      provinceLabels.forEach(l => {
        const dist = gcDist(center, l.coord);
        if(dist >= 60) return;
        const p = projection(l.coord);
        if(!p) return;
        l._el.style.display = '';
        l._el.setAttribute('x', p[0]);
        l._el.setAttribute('y', p[1]);
        l._el.style.opacity = '1';
      });
    }
  }

  function clampScale(s){ return Math.max(view.min, Math.min(view.max, s)); }

  function zoomBy(factor){
    view.scale = clampScale(view.scale * factor);
    redraw();

  // Drag to rotate
  let dragging = null;
  svg.addEventListener('pointerdown', (e) => {
    if(e.target.closest('.marker')) return;
    dragging = { x: e.clientX, y: e.clientY, r: [...view.rotate] };
    svg.setPointerCapture(e.pointerId);
    svg.style.cursor = 'grabbing';
    zHint.classList.add('fade');
  });
  svg.addEventListener('pointermove', (e) => {
    if(!dragging) return;
    const rect = svg.getBoundingClientRect();
    const dx = (e.clientX - dragging.x) * (1000 / rect.width);
    const dy = (e.clientY - dragging.y) * (560 / rect.height);
    const k = view.scale / BASE_SCALE;
    const sens = 0.25 / k;
    view.rotate[0] = dragging.r[0] + dx * sens;
    view.rotate[1] = Math.max(-89, Math.min(89, dragging.r[1] - dy * sens));
    redraw();
  });
  function endDrag(e){
    if(!dragging) return;
    dragging = null;
    svg.style.cursor = 'grab';
    try{ svg.releasePointerCapture(e.pointerId); }catch(_){}
  }
  svg.addEventListener('pointerup', endDrag);
  svg.addEventListener('pointercancel', endDrag);
  svg.addEventListener('pointerleave', endDrag);

  // Wheel to zoom
  svg.addEventListener('wheel', (e) => {
    e.preventDefault();
    zoomBy(Math.exp(-e.deltaY * 0.0015));
    zHint.classList.add('fade');
  }, { passive: false });

  // Double-click to zoom in toward clicked point
  svg.addEventListener('dblclick', (e) => {
    const rect = svg.getBoundingClientRect();
    const sx = (e.clientX - rect.left) * (1000 / rect.width);
    const sy = (e.clientY - rect.top) * (560 / rect.height);
    const inv = projection.invert && projection.invert([sx, sy]);
    if(inv){
      view.rotate[0] = -inv[0];
      view.rotate[1] = -inv[1];
    }
    zoomBy(1.8);
    zHint.classList.add('fade');
  });

  // Animated flyTo — zoom-out arc then zoom-in to destination
  const REGIONS = {
    eu: { rotate: [-5, -50, 0], scale: BASE_SCALE * 5.5 },
    us: { rotate: [95, -40, 0],  scale: BASE_SCALE * 4.0 },
    ea: { rotate: [-120, -35, 0], scale: BASE_SCALE * 4.0 },
  };

  let flyAnim = null;
  function flyTo(region) {
    const target = REGIONS[region];
    if (!target) return;
    if (flyAnim) cancelAnimationFrame(flyAnim);

    const start = { rotate: [...view.rotate], scale: view.scale };
    const t0 = performance.now();

    // Compute angular distance to decide if we need the zoom-out arc
    const dLon = Math.abs(target.rotate[0] - start.rotate[0]);
    const dLat = Math.abs(target.rotate[1] - start.rotate[1]);
    const angularDist = Math.sqrt(dLon * dLon + dLat * dLat);
    const needsArc = angularDist > 20; // significant rotation → zoom out first

    // Zoom-out trough: pull back to global view mid-flight
    const midScale = needsArc ? BASE_SCALE * 1.0 : (start.scale + target.scale) / 2;
    const duration = needsArc ? 1400 : 800; // longer for cross-globe flights

    // Highlight active button
    document.querySelectorAll('.region-nav button').forEach(b => b.classList.remove('active-region'));
    const btn = document.getElementById('r-' + region);
    if (btn) btn.classList.add('active-region');
    zHint.classList.add('fade');

    function step(now) {
      const t = Math.min(1, (now - t0) / duration);
      // Ease in-out cubic for rotation
      const e = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

      // Rotation: smooth interpolation
      view.rotate[0] = start.rotate[0] + (target.rotate[0] - start.rotate[0]) * e;
      view.rotate[1] = start.rotate[1] + (target.rotate[1] - start.rotate[1]) * e;
      view.rotate[2] = start.rotate[2] + ((target.rotate[2] || 0) - start.rotate[2]) * e;

      // Scale: parabolic arc — dip to midScale at t=0.5, arrive at target.scale at t=1
      // s(t) = (1-t)^2 * start + 2*(1-t)*t * mid + t^2 * target  (quadratic Bezier)
      const s0 = start.scale, s1 = midScale, s2 = target.scale;
      const oneMinusT = 1 - t;
      view.scale = oneMinusT * oneMinusT * s0 + 2 * oneMinusT * t * s1 + t * t * s2;

      redraw();

      if (t < 1) flyAnim = requestAnimationFrame(step);
      else flyAnim = null;
    }
    flyAnim = requestAnimationFrame(step);
  }

  // Region buttons
  document.getElementById('r-eu').onclick = () => flyTo('eu');
  document.getElementById('r-us').onclick = () => flyTo('us');
  document.getElementById('r-ea').onclick = () => flyTo('ea');

  // Buttons
  document.getElementById('z-in').onclick  = () => { zoomBy(1.6); zHint.classList.add('fade'); };
  document.getElementById('z-out').onclick = () => { zoomBy(1/1.6); };
  document.getElementById('z-reset').onclick = () => { flyTo('eu'); };

  // Keyboard
  window.addEventListener('keydown', (e) => {
    if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if(e.key === '+' || e.key === '=') zoomBy(1.4);
    else if(e.key === '-' || e.key === '_') zoomBy(1/1.4);
    else if(e.key === '0'){ flyTo('eu'); }
    else if(e.key === 'ArrowLeft')  { view.rotate[0] -= 10; redraw(); }
    else if(e.key === 'ArrowRight') { view.rotate[0] += 10; redraw(); }
    else if(e.key === 'ArrowUp')    { view.rotate[1] = Math.min(89, view.rotate[1] + 10); redraw(); }
    else if(e.key === 'ArrowDown')  { view.rotate[1] = Math.max(-89, view.rotate[1] - 10); redraw(); }
  });

  svg.style.cursor = 'grab';
  redraw();
  render();
})();
</script>
</body>
</html>
